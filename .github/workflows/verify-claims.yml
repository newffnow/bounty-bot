name: Bounty Claim Verifier

on:
  issue_comment:
    types: [created]

jobs:
  verify-claim:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state == 'open' && contains(github.event.comment.body, 'bounty') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Verify bounty claim
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTCHAIN_NODE_URL: https://rustchain.org
        run: |
          python .github/workflows/auto_verify.py \
            --issue-number ${{ github.event.issue.number }} \
            --comment-id ${{ github.event.comment.id }} \
            --username ${{ github.event.comment.user.login }} \
            --comment-body "${{ github.event.comment.body }}"
            
      - name: Post verification results
        if: always()
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ${{ env.VERIFICATION_REPORT }}
          token: ${{ secrets.GITHUB_TOKEN }}
