name: Bounty Verification

on:
  issue_comment:
    types: [created]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Bounty Claim
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          rustchain-node-url: 'https://50.28.86.131'
          follow-required: 'true'
          rtc-per-star: '1.0'
          follow-multiplier: '1.5'
